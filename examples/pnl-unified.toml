# PNL Unified — copy-trade the full composite (Core + Apex + Hydra).
#
# The CSV carries the complete 3-engine book. Hydra slot rows include a
# stop_pct column: after each BUY fills, a GTC SELL STOP is placed 1.5%
# below YOUR fill and reconciled on every run — replicating the live
# book's per-position protection at your own entry prices.
#
#   msts-trader rebalance --config examples/pnl-unified.toml --yes
#
# Requirements:
#   - msts-trader >= 0.12 (stop_pct support)
#   - a supports_stops broker for the stop legs: paper (simulated),
#     tastytrade / alpaca (adapters shipped in 0.12 — validate with a
#     1-share stop before relying on them). Other brokers execute the
#     weights and warn-and-skip the stops.
#   - fractional shares strongly recommended (Schwab/Tradier truncate
#     the ~1.8% slot lines to whole shares).

broker = "tastytrade"

# Drift relative to each LINE, not the whole book: nav-mode's 4% threshold
# would freeze the ~1.8%-of-NAV hydra slots forever.
threshold = 0.04
threshold_mode = "position"

# csv_url = "https://<your-pages-host>/data/pnl_unified_weights.csv"
csv_file = "../msts-live/docs/data/pnl_unified_weights.csv"

max_stale_hours = 30            # refuse weights older than a day
margin_aware = true             # scale into available buying power
# max_notional = 60000          # optional per-run safety cap
