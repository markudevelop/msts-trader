name: release

# Build sdist + wheel on every tag push, publish to PyPI via OIDC
# trusted publishing (no API tokens stored in this repo).
#
# Setup once: https://pypi.org/manage/project/msts-trader/settings/publishing/
#   → "Add a pending publisher" → GitHub
#       owner:        markudevelop
#       repository:   msts-trader
#       workflow:     release.yml
#       environment:  pypi
#
# To cut a release:
#   git tag v0.1.1 && git push --tags
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Re-pushed tags (e.g. converting lightweight -> annotated) re-fire
          # this workflow; PyPI rejects same-version re-uploads with a 400.
          # Treat "already on PyPI" as success, not failure.
          skip-existing: true

  github-release:
    name: create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create a release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Extract changelog section for this tag
        id: notes
        run: |
          # Literal-heading extraction (import-tested in tests/test_changelog.py).
          # Replaces the old inline awk, which fed `## [x.y.z]` to a regex match —
          # the brackets were read as a character class, so it never matched and
          # every release silently fell back to the generic note.
          python -m msts_trader.changelog "$GITHUB_REF_NAME" CHANGELOG.md > _notes.md
          echo "notes_file=_notes.md" >> "$GITHUB_OUTPUT"
          echo "--- release notes preview ---"; cat _notes.md
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — uploading assets (idempotent)"
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber || true
          else
            # --notes-file (our CHANGELOG section) is PREPENDED to --generate-notes,
            # which appends GitHub's "What's Changed" — clickable commit/PR links +
            # a "Full Changelog: prev...this" compare link — so every release is
            # navigable to its commits, not just a static blurb.
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file "${{ steps.notes.outputs.notes_file }}" \
              --generate-notes \
              dist/*
          fi
