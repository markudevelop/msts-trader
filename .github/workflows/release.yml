name: release

# Build sdist + wheel on every tag push, publish to PyPI via OIDC
# trusted publishing (no API tokens stored in this repo).
#
# Setup once: https://pypi.org/manage/project/msts-trader/settings/publishing/
#   → "Add a pending publisher" → GitHub
#       owner:        markudevelop
#       repository:   msts-trader
#       workflow:     release.yml
#       environment:  pypi
#
# To cut a release:
#   git tag v0.1.1 && git push --tags
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
