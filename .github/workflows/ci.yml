name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
        include:
          # one Windows leg: the prompt layer, console encoding, and paths
          # all behave differently there (and have broken before)
          - os: windows-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: install (with all optional brokers + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"
      - name: ruff
        run: ruff check msts_trader tests
      - name: pytest
        run: pytest -v
      - name: cli renders
        run: msts-trader --version
      - name: dependency tree consistent
        run: pip check
      - name: package builds + metadata valid
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
